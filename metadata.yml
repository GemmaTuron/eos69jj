Identifier: eos69jj
Slug: neisseria-gonorrhoeae-activity
Status: In progress
Title: N.gonorrhoeae antimicrobial activity
Description: Deep learning ML model trained on an in-house collection of two 
  libraries, 1755 clinically approved drugs and  an internal small molecule 
  library of 37K compounds. Experimental conditions include a duplicate test at 
  50uM final concentration on N.gonorrohoeae ATCC49226 (susceptible strain). The
  model has been used to prospectively screen 5M compounds identifying 58 
  compounds with activity against the WT strain, of which 22 had good chemical 
  properties (no nitro group) and 8 showed activity in MDR strains.
